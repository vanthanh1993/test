<!DOCTYPE html>
<html>
<head>
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#3b82f6,#2563eb);
        }

        .login-box{
            width:360px;
            padding:0;
        }

        .login-title{
            text-align:center;
            font-size:22px;
            font-weight:700;
            margin-bottom:15px;
        }

        .login-sub{
            text-align:center;
            font-size:13px;
            color:#666;
            margin-bottom:20px;
        }

        .login-box input{
            background:#f1f5f9;
        }

        .login-box button{
            margin-top:10px;
        }

        .login-footer{
            text-align:center;
            font-size:12px;
            color:#999;
            margin-top:15px;
        }
    </style>
</head>

<body>

<div class="card login-box">

    <div class="login-title">
        <span class="logo">🛠️</span>
        <div class="title-text">
            <span>Đăng Nhập Hệ Thống </span>
        </div>
    </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, msg in messages %}
                <div class="alert error">
                    <span class="alert-icon">⚠️</span>
                    <span class="alert-text">{{ msg }}</span>
                </div>
            {% endfor %}
        {% endwith %}

    <form method="post">

        <input name="username" placeholder="👤 Tài khoản" required>

        <input name="password" type="password" id="password" placeholder="🔒 Mật khẩu" required>
		
		<div style="display:flex; align-items:center; gap:8px; margin:10px 0 5px;">
            <input type="checkbox" name="remember" id="remember" style="width:auto; margin:0;">
            <label for="remember" style="margin:0; cursor:pointer;">
               Ghi nhớ đăng nhập
            </label>
        </div>

        <button class="btn btn-primary login-btn">
            🔑 Đăng nhập
        </button>

    </form>

    <div class="login-footer">
        Copyright © {{ current_year }} By Hoàng Hà
    </div>

<script>
setTimeout(()=>{
    document.querySelectorAll(".alert").forEach(n=>{
        n.style.transition="all 0.4s";
        n.style.opacity="0";
        n.style.transform="translateY(-5px)";
        setTimeout(()=>n.remove(),400);
    });
},4000);
</script>

</div>

</body>
</html>
